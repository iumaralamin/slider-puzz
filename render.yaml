services:
  - type: web
    name: telegram-puzzle-bot
    runtime: node
    plan: free
    buildCommand: npm run install:all
    startCommand: cd bot && npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_USERNAMES
        sync: false
      - key: WEB_APP_URL
        fromService:
          name: telegram-puzzle-bot
          type: web
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: puzzle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: puzzle-db
    databaseName: puzzle_db
    user: puzzle_user
    plan: free
