services:
  - type: web
    name: puzzle-bot-api
    runtime: node
    buildCommand: cd bot && npm install
    startCommand: cd bot && npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_USERNAMES
        sync: false
      - key: WEB_APP_URL
        fromService:
          name: puzzle-web-app
          type: web
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: puzzle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: puzzle-web-app
    runtime: node
    buildCommand: cd web && npm install
    startCommand: cd web && npm start
    envVars:
      - key: PORT
        value: 10000

databases:
  - name: puzzle-db
    databaseName: puzzle_db
    user: puzzle_user
    plan: free