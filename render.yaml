services:
  # Bot + API Service
  - type: web
    name: puzzle-bot-api
    runtime: node
    plan: free
    rootDir: bot
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_USERNAMES
        sync: false
      - key: WEB_APP_URL
        fromService:
          name: puzzle-web-app
          type: web
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: puzzle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Web App Service
  - type: web
    name: puzzle-web-app
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000

databases:
  - name: puzzle-db
    databaseName: puzzle_db
    user: puzzle_user
    plan: free
